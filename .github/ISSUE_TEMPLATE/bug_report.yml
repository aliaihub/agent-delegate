name: Bug report
description: Something broken? Tell us what happened.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include enough info to reproduce.
  - type: input
    id: version
    attributes:
      label: agent-delegate version
      description: Output of `agent-delegate --version`
      placeholder: agent-delegate 0.1.0
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: 3.12.4
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: profile
    attributes:
      label: Profile / backend
      description: Which profile were you using? (ollama, lmstudio, openrouter, haiku, custom)
      placeholder: ollama
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Exact commands you ran, in order.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error message + stack trace if any.
      render: shell
    validations:
      required: true
